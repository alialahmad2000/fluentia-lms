<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0d080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8762e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060e1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f3c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)" />
  <!-- Gold border accent -->
  <rect x="16" y="16" width="480" height="480" rx="80" fill="none" stroke="url(#goldGrad)" stroke-width="6" opacity="0.6" />
  <!-- Letter F -->
  <text
    x="256"
    y="360"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="340"
    font-weight="700"
    text-anchor="middle"
    fill="url(#goldGrad)"
  >F</text>
</svg>
