    <script>
      // Apply design-system theme before first paint to prevent flash
      (function() {
        try {
          var saved = localStorage.getItem('fluentia-theme');
          var valid = ['aurora-cinematic', 'night', 'minimal'];
          var theme = (saved && valid.indexOf(saved) > -1) ? saved : 'night';
          document.documentElement.setAttribute('data-theme', theme);
          // Backward-compat class for legacy CSS (.dark / .light)
          document.documentElement.classList.remove('dark', 'light');
          document.documentElement.classList.add(theme === 'minimal' ? 'light' : 'dark');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'night');
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

  <body class="font-tajawal bg-[var(--surface-base)] text-[var(--text-primary)] antialiased">
    <div id="root"></div>
    <script>
      // One-time service worker + cache purge to fix stale deployments
      // After purge, VitePWA will re-register a fresh SW on next build
      (function() {
        var PURGE_KEY = 'sw_purge_v4';
        if (localStorage.getItem(PURGE_KEY)) return;
        localStorage.setItem(PURGE_KEY, '1');
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(n) { caches.delete(n); });
            if (names.length > 0) window.location.reload();
          });
        }
      })();
    </script>
