<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050d1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fluentia Academy" />
    <meta name="description" content="Fluentia Academy — أكاديمية طلاقة" />

    <!-- Open Graph -->
    <meta property="og:title" content="أكاديمية طلاقة — Fluentia Academy" />
    <meta property="og:description" content="منصة تعلم اللغة الإنجليزية الأولى في السعودية. تعلم مع مدربين محترفين وتقنيات الذكاء الاصطناعي." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fluentia-site.vercel.app" />
    <meta property="og:image" content="https://fluentia-site.vercel.app/og-image.png" />
    <meta property="og:locale" content="ar_SA" />
    <meta property="og:site_name" content="Fluentia Academy" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="أكاديمية طلاقة — Fluentia Academy" />
    <meta name="twitter:description" content="منصة تعلم اللغة الإنجليزية الأولى في السعودية" />
    <meta name="twitter:image" content="https://fluentia-site.vercel.app/og-image.png" />

    <!-- Additional SEO -->
    <link rel="canonical" href="https://fluentia-site.vercel.app" />
    <meta name="robots" content="index, follow" />

    <link rel="icon" type="image/png" href="/logo-icon-dark.png" />
    <link rel="apple-touch-icon" href="/logo-icon-dark.png" />
    <link rel="preconnect" href="https://nmjexpuycmqcxuxljier.supabase.co" />
    <link rel="dns-prefetch" href="https://nmjexpuycmqcxuxljier.supabase.co" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
    <title>Fluentia Academy — أكاديمية طلاقة</title>
    <script>
      // Apply theme before first paint to prevent flash
      (function(){
        var t = 'dark';
        try { t = localStorage.getItem('fluentia_theme') || 'dark' } catch(e){}
        if (t === 'auto') t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.classList.add(t);
      })();
    </script>
  </head>
  <body class="font-tajawal bg-[var(--surface-base)] text-[var(--text-primary)] antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
